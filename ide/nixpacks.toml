[phases.setup]
nixPkgs = ["python312", "nodejs_20", "nodePackages.npm", "python312Packages.pip"]

[phases.install]
cmds = [
  "python3 -m pip install -r requirements.txt",
  "cd frontend && npm install"
]

[phases.build]
cmds = [
  "cd frontend && npm run build"
]

[start]
cmd = "python3 server.py"
